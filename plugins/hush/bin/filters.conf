# filters.conf — Declarative output compression rules.
#
# Format: PATTERN | STRATEGY | ARGS
#
# PATTERN:   regex matched against the full command string
# STRATEGY:  one of: strip_lines, success_summary, tail_only, passthrough
# ARGS:      strategy-specific arguments
#
# Strategies:
#   strip_lines <regex>        — remove lines matching regex, keep everything else
#   success_summary <N>        — on exit 0: show last N lines + breadcrumb. on failure: show all
#   tail_only <N>              — always show only last N lines + breadcrumb
#   head_tail <H> <T>          — show first H + last T lines + breadcrumb
#   passthrough                — no compression (for commands that should never be touched)
#
# Lines starting with # are comments. Blank lines are ignored.
# First matching rule wins.

# ─── Git ────────────────────────────────────────────────────────────────────
^git status$|^git status\s              | custom    | git_status
^git push|^git pull|^git fetch          | strip_lines | ^remote: (Counting|Compressing|Total|Enumerating)|^Receiving objects:|^Resolving deltas:
^git clone                              | strip_lines | ^Receiving objects:|^Resolving deltas:|^remote: (Counting|Compressing|Total|Enumerating)
^git log\b                              | custom    | git_log
^git diff\b                             | custom    | git_diff
^git add\b                              | passthrough |
^git commit\b                           | passthrough |

# ─── GitHub CLI ─────────────────────────────────────────────────────────────
^gh pr list|^gh issue list|^gh run list | head_tail | 40 5
^gh pr view|^gh pr checks              | head_tail | 60 20

# ─── Test Runners ───────────────────────────────────────────────────────────
^pytest|python.*-m pytest               | success_summary | 15
^cargo test|^cargo nextest              | success_summary | 15
^npm test|^yarn test|^pnpm test         | success_summary | 15
^npx jest|^npx vitest|^vitest run       | success_summary | 15
^go test                                | success_summary | 15
^dotnet test                            | success_summary | 15
^npx playwright|^playwright test        | success_summary | 20
^bundle exec rspec|^rspec               | success_summary | 15
^mix test                               | success_summary | 15
^swift test                             | success_summary | 15

# ─── Build Tools ────────────────────────────────────────────────────────────
^cargo build|^cargo check               | strip_lines | ^\s*(Compiling|Downloading|Downloaded|Fetching)\s
^cargo clippy                           | strip_lines | ^\s*(Compiling|Checking|Downloading|Downloaded)\s
^npm install|^npm ci|^yarn install      | success_summary | 10
^pnpm install|^pnpm add                 | success_summary | 10
^pip install|^uv pip install|^uv sync   | success_summary | 10
^poetry install|^composer install       | success_summary | 10
^bundle install                         | success_summary | 10
^go build                               | success_summary | 5
^dotnet build|^dotnet restore           | strip_lines | ^\s*(Restore completed|Determining projects)
^next build|^npx next build             | strip_lines | ^\s*(Compiling|Collecting page data)
^make\b|^cmake --build                  | strip_lines | ^\s*(Compiling|Linking|Building)\s
^swift build                            | strip_lines | ^\s*(Compiling|Linking)\s
^xcodebuild                             | strip_lines | ^\s*(CompileC|Ld|CodeSign|ProcessInfoPlistFile)
^mvn\s                                  | strip_lines | ^\[INFO\] (Downloading|Downloaded|Building)

# ─── Linters & Type Checkers ───────────────────────────────────────────────
^npx tsc|^tsc\b                         | head_tail | 60 10
^npx eslint|^eslint\b                   | head_tail | 60 10
^ruff check|^ruff\b                     | head_tail | 60 10
^mypy\b                                 | head_tail | 60 10
^golangci-lint\b                        | head_tail | 60 10
^shellcheck\b                           | head_tail | 40 10
^hadolint\b                             | head_tail | 40 10
^markdownlint\b                         | head_tail | 40 10
^yamllint\b                             | head_tail | 40 10
^prettier --check|^biome check          | head_tail | 40 10

# ─── Docker & Kubernetes ───────────────────────────────────────────────────
^docker build                           | strip_lines | ^(Step \d+|Sending build context|---> [a-f0-9])
^docker compose build                   | strip_lines | ^(Building|Step \d+|---> )
^docker compose up                      | tail_only  | 30
^docker compose logs|^docker logs       | tail_only  | 50
^docker ps|^docker compose ps           | head_tail | 40 5
^docker images                          | head_tail | 40 5
^docker pull|^docker push               | strip_lines | ^([a-f0-9]+: (Pulling|Waiting|Downloading|Extracting|Pull complete|Pushed|Layer already))
^kubectl get pods|^kubectl get svc      | head_tail | 40 5
^kubectl logs                           | tail_only  | 50
^kubectl describe                       | head_tail | 60 20

# ─── Cloud / Infra ─────────────────────────────────────────────────────────
^terraform plan|^tofu plan              | head_tail | 40 30
^terraform apply|^tofu apply            | success_summary | 20
^terraform init|^tofu init              | success_summary | 5
^ansible-playbook                       | strip_lines | ^(TASK \[Gathering Facts\]|ok: \[)
^aws\s                                  | head_tail | 60 10
^gcloud\s                               | head_tail | 60 10
^helm\s                                 | head_tail | 40 10

# ─── Database / ORM ────────────────────────────────────────────────────────
^npx prisma generate                    | success_summary | 5
^npx prisma migrate                     | success_summary | 10
^npx prisma db push                     | success_summary | 5
^psql\b                                 | head_tail | 60 10

# ─── Data / Network ────────────────────────────────────────────────────────
^curl\s                                 | head_tail | 80 10
^wget\s                                 | strip_lines | ^\s*(\d+K .* \d+% |Resolving|Connecting|HTTP request sent)
^rsync\s                                | strip_lines | ^(sending incremental|sent .* bytes|total size)
^ping\s                                 | tail_only  | 10
^ssh\s                                  | passthrough |

# ─── System ─────────────────────────────────────────────────────────────────
^ps aux|^ps -ef                         | head_tail | 40 5
^df\b                                   | head_tail | 30 5
^du\b                                   | head_tail | 40 5
^systemctl status                       | head_tail | 30 5
^brew install                           | success_summary | 5

# ─── File Tools ─────────────────────────────────────────────────────────────
^find\s                                 | head_tail | 50 5
^cat\s                                  | head_tail | 80 20
^ls\b                                   | head_tail | 50 5
^tree\b                                 | head_tail | 50 5
^grep\s|^rg\s                           | head_tail | 50 5
^wc\s                                   | passthrough |
